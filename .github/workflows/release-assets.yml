name: Release Assets

on:
  release:
    types: [published]
  workflow_run:
    workflows: ["Release PR"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. galeharness-cli-v2.0.0)"
        required: false

jobs:
  determine-version:
    if: >-
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      skip: ${{ steps.version.outputs.skip }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Determine version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
          WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$DISPATCH_TAG"
          elif [ "$EVENT_NAME" = "release" ]; then
            TAG="$RELEASE_TAG"
          else
            TAG="$(gh release list \
              --repo "$GITHUB_REPOSITORY" \
              --limit 20 \
              --json tagName,isDraft \
              --jq '[.[] | select(.isDraft == false and (.tagName | startswith("galeharness-cli-v")))] | first | .tagName')"
          fi

          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "No galeharness-cli release tag found; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$TAG" != galeharness-cli-v* ]]; then
            echo "Tag '$TAG' is not a galeharness-cli release; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT_NAME" = "workflow_run" ]; then
            TARGET_COMMITISH="$(gh release view "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --json targetCommitish \
              --jq '.targetCommitish')"
            if [ "$TARGET_COMMITISH" != "$WORKFLOW_HEAD_SHA" ]; then
              echo "Latest galeharness-cli release '$TAG' points to '$TARGET_COMMITISH', not workflow head '$WORKFLOW_HEAD_SHA'; skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          VERSION="${TAG#galeharness-cli-v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

  build-and-upload:
    needs: determine-version
    if: needs.determine-version.result == 'success' && needs.determine-version.outputs.skip != 'true'
    runs-on: macos-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - darwin-arm64
          - darwin-x64
          - linux-arm64
          - linux-x64
          - windows-arm64
          - windows-x64

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release binaries
        run: bun run build:release --version ${{ needs.determine-version.outputs.version }} --platform ${{ matrix.platform }}

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARCHIVE="galeharness-cli-${{ needs.determine-version.outputs.version }}-${{ matrix.platform }}.tar.gz"
          gh release upload "${{ needs.determine-version.outputs.tag }}" "$ARCHIVE" --clobber
