name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          requireScope: false
          types: |
            feat
            fix
            docs
            refactor
            chore
            test
            ci
            build
            perf
            revert

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Validate release metadata
        run: bun run release:validate

      - name: Run tests
        run: bun test --path-ignore-patterns="**/resolve-base-script*"

  test-windows:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Validate release metadata
        run: bun run release:validate

      - name: Run setup.ps1 (CI mode)
        shell: pwsh
        env:
          GHALE_CI: "1"
        run: |
          $env:GHALE_CI = "1"
          & .\scripts\setup.ps1

      - name: Run tests
        run: bun test --path-ignore-patterns="**/cli.test.ts" --path-ignore-patterns="**/detect-tools.test.ts" --path-ignore-patterns="**/plugin-path.test.ts" --path-ignore-patterns="**/resolve-output.test.ts" --path-ignore-patterns="**/sync-codex.test.ts" --path-ignore-patterns="**/sync-copilot.test.ts" --path-ignore-patterns="**/sync-kimi.test.ts" --path-ignore-patterns="**/sync-windsurf.test.ts"
