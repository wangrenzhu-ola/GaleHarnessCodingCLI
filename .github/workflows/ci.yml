name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          requireScope: false
          types: |
            feat
            fix
            docs
            refactor
            chore
            test
            ci
            build
            perf
            revert

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Validate release metadata
        run: bun run release:validate

      - name: Run tests
        run: bun test --path-ignore-patterns="**/resolve-base-script*"

      - name: Smoke release archive install
        shell: bash
        run: |
          set -euo pipefail

          archive_path="$(bun run scripts/release/build.ts --platform linux-x64)"
          bun run scripts/release/verify-archive.ts "$archive_path"

          install_dir="$(mktemp -d)"
          home_dir="$(mktemp -d)"
          old_target="$(mktemp)"
          printf 'old\n' > "$old_target"
          ln -s "$old_target" "$install_dir/gale-harness"
          printf '0.0.0\n' > "$install_dir/VERSION"

          INSTALL_DIR="$install_dir" \
            HOME="$home_dir" \
            PATH="$install_dir:$PATH" \
            GALE_RELEASE_ARCHIVE="$archive_path" \
            CI=1 \
            bash scripts/install-release.sh

          test ! -L "$install_dir/gale-harness"
          test "$(cat "$install_dir/VERSION")" = "$(node -p "require('./package.json').version")"

          PATH="$install_dir:$PATH" gale-harness --version
          PATH="$install_dir:$PATH" compound-plugin --help
          PATH="$install_dir:$PATH" gale-knowledge --help
          PATH="$install_dir:$PATH" gale-memory --help

  test-windows:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Validate release metadata
        run: bun run release:validate

      - name: Run setup.ps1 (CI mode)
        shell: pwsh
        env:
          GHALE_CI: "1"
        run: |
          $env:GHALE_CI = "1"
          & .\scripts\setup.ps1

      - name: Run tests
        run: bun test --timeout=60000 --path-ignore-patterns="**/cli.test.ts" --path-ignore-patterns="**/detect-tools.test.ts" --path-ignore-patterns="**/plugin-path.test.ts" --path-ignore-patterns="**/resolve-output.test.ts" --path-ignore-patterns="**/sync-codex.test.ts" --path-ignore-patterns="**/sync-copilot.test.ts" --path-ignore-patterns="**/sync-kimi.test.ts" --path-ignore-patterns="**/sync-windsurf.test.ts"
